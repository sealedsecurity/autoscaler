# Sealed fork image publish — builds ghcr.io/sealedsecurity/autoscaler from the
# fork's own Woodpecker CI (ci.sealedsecurity.com), pinned sealed tags only.
#
# This is additive to upstream's .woodpecker/release.yaml (which is left intact
# so rebases onto upstream stay cheap); that file publishes upstream's DockerHub
# image and never fires here. The elastic-runner pool (SEA-1122 parent) pins the
# tag this produces.
#
# Tagging: on a sealed release tag (e.g. 1.5.0-sealed.1) push that exact tag; on
# a push to the default branch push a sha-suffixed dev tag. No :latest is ever
# published — the pool always pins an explicit immutable tag.
#
# Requires (fork CI setup, Matt-steps): the fork enrolled on
# ci.sealedsecurity.com and a `ghcr_token` secret (a PAT / GITHUB_TOKEN with
# write:packages for ghcr.io/sealedsecurity) registered on the repo. The secret
# MUST be registered restricted to the push and tag events only — never
# pull_request — so a PR that adds a step referencing `from_secret: ghcr_token`
# cannot read the credential. (Woodpecker's default already withholds secrets
# from pull_request events; this makes the required posture explicit rather than
# assumed.) Only sealed release tags (`*-sealed.*`) publish — the publish-tag
# step is gated on that ref pattern, so a stray or upstream tag never pushes.

when:
  - event: [pull_request, tag]
  - event: push
    branch: ${CI_REPO_DEFAULT_BRANCH}

variables:
  - &buildx_plugin 'docker.io/woodpeckerci/plugin-docker-buildx:6.1.0'
  - &sealed_buildx_settings
    buildkit_oci_max_parallelism: 1
    dockerfile: docker/Dockerfile
    repo: 'ghcr.io/sealedsecurity/autoscaler'
    registry: 'ghcr.io'
    platforms: 'linux/arm64/v8,linux/amd64'
  - &golang_image 'docker.io/golang:1.26'

steps:
  - name: vendor
    image: *golang_image
    commands:
      - go mod vendor

  - name: dryrun
    image: *buildx_plugin
    settings:
      <<: *sealed_buildx_settings
      dry_run: true
      tag: test
    when:
      - event: pull_request

  - name: publish-dev
    image: *buildx_plugin
    settings:
      <<: *sealed_buildx_settings
      tag: 'dev-${CI_COMMIT_SHA:0:10}'
      username: sealed-autoscaler
      password:
        from_secret: ghcr_token
    when:
      branch: ${CI_REPO_DEFAULT_BRANCH}
      event: push

  - name: publish-tag
    image: *buildx_plugin
    settings:
      <<: *sealed_buildx_settings
      tag: '${CI_COMMIT_TAG}'
      username: sealed-autoscaler
      password:
        from_secret: ghcr_token
    when:
      event: tag
      ref: 'refs/tags/*-sealed.*'
